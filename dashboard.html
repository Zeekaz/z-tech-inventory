<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-Tech Global | Imperial Vault</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Gothic Dark Theme */
        body { background-color: #0a0a0a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1050px; margin: auto; border: 1px solid #333; padding: 20px; border-radius: 8px; background: #111; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        h1 { color: #d4af37; text-align: center; font-size: 26px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { border-bottom: 2px solid #d4af37; padding: 12px; text-align: left; color: #d4af37; font-size: 16px; }
        td { padding: 12px; border-bottom: 1px solid #222; font-size: 15px; vertical-align: middle; }
        .badge { background: #333; color: #d4af37; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; border: 1px solid #d4af37; }
        
        .btn-create { display: inline-block; padding: 12px 24px; background: #d4af37; color: #000; text-decoration: none; font-weight: bold; font-size: 16px; border-radius: 5px; border: 2px solid #b5952f; cursor: pointer; transition: 0.2s; }
        .btn-create:hover { background: #b5952f; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(212, 175, 55, 0.2); }
        
        .btn-qr { background: #222; color: #d4af37; border: 1px solid #d4af37; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-qr:hover { background: #d4af37; color: #000; }

        .filter-section { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-input { flex: 1; min-width: 150px; padding: 10px; background: #222; border: 1px solid #444; color: white; border-radius: 4px; font-size: 15px; }

        /* Modal Styles */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); overflow-y: auto; }
        .modal-content { background-color: #111; margin: 5% auto; padding: 30px; border: 2px solid #d4af37; width: 90%; max-width: 600px; border-radius: 10px; box-shadow: 0 0 30px rgba(212, 175, 55, 0.2); position: relative; }
        .close { color: #888; position: absolute; right: 20px; top: 15px; font-size: 28px; font-weight: bold; cursor: pointer; }
        .close:hover { color: #ff4444; }

        /* Form Styles */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; color: #d4af37; margin-bottom: 5px; font-size: 14px; font-weight: bold; }
        .form-input { width: 100%; padding: 10px; background: #050505; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; }
        .form-input:focus { border-color: #39ff14; outline: none; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        
        .btn-submit { width: 100%; padding: 15px; background: #4a0e4e; color: white; font-size: 18px; font-weight: bold; border: 1px solid #8b008b; border-radius: 5px; cursor: pointer; margin-top: 20px; transition: 0.2s; }
        .btn-submit:hover { background: #6a1b6a; box-shadow: 0 0 15px rgba(139, 0, 139, 0.5); }
        
        .thumb-img { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; border: 1px solid #d4af37; }
        .thumb-placeholder { width: 50px; height: 50px; background: #222; border-radius: 4px; border: 1px solid #444; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌑 Z-TECH IMPERIAL VAULT 🌑</h1>
        
        <div style="text-align: center; margin-bottom: 30px; display: flex; justify-content: center; gap: 15px;">
            <button onclick="checkAdmin('manage')" class="btn-create">🔮 ร่ายเวทย์เพิ่มสายพันธุ์ใหม่</button>
            <button onclick="checkAdmin('log')" class="btn-create" style="background: #8b0000; border-color: #550000; color: white;">👁️ ตรวจสอบประวัติบิล & กำไรสุทธิ</button>
        </div>

        <div class="filter-section">
            <input type="text" id="search-input" class="filter-input" placeholder="🔍 ค้นหาสายพันธุ์ หรือ รหัส SKU..." onkeyup="filterTable()">
            <select id="category-filter" class="filter-input" onchange="filterTable()" style="flex: 0.5;">
                <option value="">-- ทุกประเภท --</option>
                <option value="ดอก">ดอก (Flower)</option>
                <option value="ผง">ผง (Kief/Shake)</option>
                <option value="ใบทริม">ใบทริม (Trim)</option>
            </select>
            <select id="grade-filter" class="filter-input" onchange="filterTable()" style="flex: 0.5;">
                <option value="">-- ทุกเกรด --</option>
                <option value="TOP">TOP</option>
                <option value="Mid">Mid</option>
                <option value="Pop">Pop</option>
            </select>
        </div>

        <table>
            <thead>
                <tr>
                    <th>รูปภาพ</th>
                    <th>รหัสสินค้า (SKU)</th>
                    <th>สายพันธุ์ (Strain)</th>
                    <th>ประเภท</th>
                    <th>เกรด</th>
                    <th>รับจากฟาร์ม</th>
                    <th>น้ำหนัก (g)</th>
                    <th style="text-align:center;">Action</th>
                </tr>
            </thead>
            <tbody id="product-list">
                <tr><td colspan="8" style="text-align:center; padding: 20px;">กำลังเปิดประตูคลังแห่งความมืด...</td></tr>
            </tbody>
        </table>
    </div>

    <div id="addProductModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeAddModal()">&times;</span>
            <h2 style="color:#d4af37; margin-top:0; text-align:center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px;">
                🔮 อาคมสร้างสายพันธุ์ใหม่
            </h2>
            
            <div class="grid-2">
                <div class="form-group">
                    <label>รหัส SKU (สร้างอัตโนมัติ)</label>
                    <input type="text" id="f_sku" class="form-input" readonly style="color: #888; background: #111;">
                </div>
                <div class="form-group">
                    <label>ชื่อสายพันธุ์ (Strain Name)</label>
                    <input type="text" id="f_strain" class="form-input" placeholder="เช่น Z-Core">
                </div>
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label>ประเภท (Category)</label>
                    <select id="f_category" class="form-input">
                        <option value="ดอก">ดอก (Flower)</option>
                        <option value="ผง">ผง (Kief/Shake)</option>
                        <option value="ใบทริม">ใบทริม (Trim)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>เกรด (Grade)</label>
                    <select id="f_grade" class="form-input">
                        <option value="TOP">TOP (AAA+)</option>
                        <option value="Mid">Mid (AA)</option>
                        <option value="Pop">Pop (A)</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>ลิงก์รูปภาพดาร์กๆ (Image URL - ใส่หรือไม่ใส่ก็ได้)</label>
                <input type="text" id="f_image" class="form-input" placeholder="https://...">
            </div>

            <h3 style="color:#888; font-size:14px; border-bottom:1px solid #333; padding-bottom:5px; margin-top:20px;">📦 ข้อมูลฟาร์ม & โครงสร้างราคา</h3>
            
            <div class="grid-2">
                <div class="form-group">
                    <label>ชื่อฟาร์ม (ต้นทาง)</label>
                    <input type="text" id="f_farm" class="form-input" placeholder="เช่น Highbud Farm">
                </div>
                <div class="form-group">
                    <label>ต้นทุนรับเข้า (บาท/กรัม)</label>
                    <input type="number" step="any" id="f_cost" class="form-input" placeholder="0">
                </div>
            </div>

            <div class="grid-3">
                <div class="form-group">
                    <label>ราคาปลีก (Base)</label>
                    <input type="number" step="any" id="f_base" class="form-input" placeholder="0">
                </div>
                <div class="form-group">
                    <label>ราคาส่ง (Tier 1)</label>
                    <input type="number" step="any" id="f_t1" class="form-input" placeholder="0">
                </div>
                <div class="form-group">
                    <label>ราคาส่ง (Tier 2)</label>
                    <input type="number" step="any" id="f_t2" class="form-input" placeholder="0">
                </div>
            </div>

            <div class="form-group" style="margin-top: 10px;">
                <label style="color: #39ff14;">⚖️ จำนวนสต๊อกแรกเข้า (กรัม)</label>
                <input type="number" step="any" id="f_stock" class="form-input" placeholder="0" style="border-color: #39ff14; font-weight: bold;">
            </div>

            <button class="btn-submit" id="save-btn" onclick="saveNewProduct()">🩸 ประทับตราเวทมนตร์ (บันทึกข้อมูล)</button>
        </div>
    </div>

    <div id="qrModal" class="modal">
        <div class="modal-content" style="width: 320px;">
            <span class="close" onclick="closeQR()">&times;</span>
            <h2 id="modalStrain" style="color:#d4af37; margin-top:0;"></h2>
            <p id="modalSku" style="font-family: monospace; color:#aaa; font-size: 18px;"></p>
            <div style="background: white; padding: 15px; display: inline-block; border-radius: 8px; margin: 15px 0;">
                <img id="modalQrImg" src="" alt="QR Code" style="display:block;">
            </div>
            <br>
            <button onclick="printQR()" style="padding: 12px 24px; background:#d4af37; color:#000; border:none; border-radius:4px; cursor:pointer; font-weight:bold; font-size:16px; width:100%;">🖨️ พิมพ์ QR Code ซ้ำ</button>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://zwpagcqoopvinufsgluc.supabase.co';
        const supabaseKey = 'sb_publishable_mirbWPp7tEPi5YiTFPnSSw_BZsKkfLa'; 
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);
        let allProducts = [];

        async function loadInventory() {
            const { data, error } = await _supabase.from('ztech_inventory').select('*').order('last_updated', { ascending: false });
            const list = document.getElementById('product-list');
            
            if (error) {
                list.innerHTML = `<tr><td colspan="8" style="text-align:center;color:#ff4444;">❌ ขัดข้อง: ${error.message}</td></tr>`;
                return;
            }

            if (data && data.length > 0) {
                allProducts = data; 
                renderTable(allProducts); 
            } else {
                list.innerHTML = `<tr><td colspan="8" style="text-align:center; padding: 30px; color: #666;">คลังสินค้าว่างเปล่า...</td></tr>`;
            }
        }

        function renderTable(dataToRender) {
            const list = document.getElementById('product-list');
            if (dataToRender.length > 0) {
                list.innerHTML = dataToRender.map(item => {
                    // เช็กว่ามีรูปไหม ถ้าไม่มีให้ขึ้นกล่อง NO IMG ดาร์กๆ
                    let imgThumb = item.image_url 
                        ? `<img src="${item.image_url}" class="thumb-img">` 
                        : `<div class="thumb-placeholder">NO IMG</div>`;
                        
                    return `
                    <tr>
                        <td>${imgThumb}</td>
                        <td style="color: #fff; font-family: monospace; font-size: 16px;">${item.sku}</td>
                        <td style="font-weight: bold;">${item.strain_name}</td>
                        <td>${item.category}</td>
                        <td><span class="badge">${item.grade}</span></td>
                        <td style="color: #888; font-size: 13px;">${item.farm_name || '-'}</td>
                        <td style="color: #39ff14; font-weight: bold; font-size: 16px;">${item.stock_weight.toLocaleString()} g</td>
                        <td style="text-align:center;"><button onclick="openQR('${item.sku}', '${item.strain_name}', '${item.grade}')" class="btn-qr">🔳 QR</button></td>
                    </tr>
                    `;
                }).join('');
            } else {
                list.innerHTML = `<tr><td colspan="8" style="text-align:center; padding: 20px; color: #666;">-- ไม่พบสายพันธุ์ที่ค้นหา --</td></tr>`;
            }
        }

        function filterTable() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const categoryTerm = document.getElementById('category-filter').value;
            const gradeTerm = document.getElementById('grade-filter').value;

            const filteredData = allProducts.filter(item => {
                const matchSearch = item.strain_name.toLowerCase().includes(searchTerm) || item.sku.toLowerCase().includes(searchTerm);
                const matchCategory = categoryTerm === "" || item.category === categoryTerm;
                const matchGrade = gradeTerm === "" || item.grade === gradeTerm;
                return matchSearch && matchCategory && matchGrade;
            });
            renderTable(filteredData);
        }

        function checkAdmin(targetPage) {
            let pass = prompt("🌑 ระบบสงวนสิทธิ์เฉพาะผู้บริหาร กรุณาใส่รหัสผ่าน:");
            if (pass === "0420") {
                if(targetPage === 'manage') openAddModal();
                if(targetPage === 'log') window.location.href = "log.html"; 
            } else if (pass !== null && pass !== "") {
                alert("❌ รหัสผ่านไม่ถูกต้อง! คุณไม่มีสิทธิ์เข้าถึงส่วนนี้ค่ะ");
            }
        }

        // --- ระบบเพิ่มสินค้าใหม่ ---
        function generateSKU() {
            const randomStr = Math.random().toString(36).substr(2, 6).toUpperCase();
            return `ZT-${randomStr}`;
        }

        function openAddModal() {
            document.getElementById('f_sku').value = generateSKU();
            document.getElementById('addProductModal').style.display = 'block';
        }

        function closeAddModal() {
            document.getElementById('addProductModal').style.display = 'none';
        }

        async function saveNewProduct() {
            const sku = document.getElementById('f_sku').value;
            const strain_name = document.getElementById('f_strain').value.trim();
            const category = document.getElementById('f_category').value;
            const grade = document.getElementById('f_grade').value;
            const image_url = document.getElementById('f_image').value.trim();
            const farm_name = document.getElementById('f_farm').value.trim();
            
            const cost_price = parseFloat(document.getElementById('f_cost').value) || 0;
            const price_base = parseFloat(document.getElementById('f_base').value) || 0;
            const price_tier1 = parseFloat(document.getElementById('f_t1').value) || 0;
            const price_tier2 = parseFloat(document.getElementById('f_t2').value) || 0;
            const stock_weight = parseFloat(document.getElementById('f_stock').value) || 0;

            if(!strain_name) return alert("⚠️ กรุณาระบุชื่อสายพันธุ์ค่ะ");

            const btn = document.getElementById('save-btn');
            btn.innerHTML = "⏳ กำลังบันทึกข้อมูล...";
            btn.disabled = true;

            try {
                const { error } = await _supabase.from('ztech_inventory').insert([{
                    sku, strain_name, category, grade, image_url, farm_name,
                    cost_price, price_base, price_tier1, price_tier2, stock_weight
                }]);

                if (error) throw error;

                alert("✅ เพิ่มสายพันธุ์ใหม่ลงคลังสำเร็จแล้วค่ะ!");
                closeAddModal();
                
                document.querySelectorAll('.form-input').forEach(input => {
                    if(input.id !== 'f_category' && input.id !== 'f_grade' && input.id !== 'f_sku') input.value = '';
                });

                loadInventory(); 

            } catch (error) {
                alert("❌ เกิดข้อผิดพลาด: " + error.message);
            } finally {
                btn.innerHTML = "🩸 ประทับตราเวทมนตร์ (บันทึกข้อมูล)";
                btn.disabled = false;
            }
        }

        // --- ระบบ QR Code ---
        function openQR(sku, strain, grade) {
            document.getElementById('modalStrain').innerText = strain + " (" + grade + ")";
            document.getElementById('modalSku').innerText = sku;
            document.getElementById('modalQrImg').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${sku}`;
            document.getElementById('qrModal').style.display = 'block';
        }

        function closeQR() {
            document.getElementById('qrModal').style.display = 'none';
        }

        function printQR() {
            let imgSrc = document.getElementById('modalQrImg').src;
            let title = document.getElementById('modalStrain').innerText;
            let sku = document.getElementById('modalSku').innerText;
            let printWindow = window.open('', '', 'width=600,height=600');
            printWindow.document.write(`
                <html>
                <body style="text-align:center; font-family:sans-serif; margin-top:50px;">
                    <h2 style="margin-bottom: 5px;">${title}</h2>
                    <p style="font-family:monospace; font-size:18px; margin-top:0;">${sku}</p>
                    <img src="${imgSrc}" style="width:200px; height:200px; border:2px solid #000; padding:10px;">
                    <script>setTimeout(() => { window.print(); window.close(); }, 500);<\/script>
                </body>
                </html>
            `);
        }

        loadInventory();
    </script>
</body>
</html>
