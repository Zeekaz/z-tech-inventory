<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-Tech Global | Imperial Vault</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Gothic Dark Theme */
        body { background-color: #0a0a0a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; border: 1px solid #333; padding: 20px; border-radius: 8px; background: #111; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        h1 { color: #d4af37; text-align: center; font-size: 26px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { border-bottom: 2px solid #d4af37; padding: 12px; text-align: left; color: #d4af37; font-size: 16px; }
        td { padding: 12px; border-bottom: 1px solid #222; font-size: 15px; }
        .badge { background: #333; color: #d4af37; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; border: 1px solid #d4af37; }
        
        /* สไตล์ปุ่มสร้าง QR Code */
        .btn-create {
            display: inline-block; 
            padding: 12px 24px; 
            background: #d4af37; 
            color: #000; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 16px; 
            border-radius: 5px; 
            border: 2px solid #b5952f; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }
        .btn-create:hover { background: #b5952f; transform: scale(1.02); }

        /* สไตล์ช่องค้นหาและตัวกรอง */
        .filter-section {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filter-input {
            flex: 1;
            min-width: 150px;
            padding: 10px;
            background: #222;
            border: 1px solid #444;
            color: white;
            border-radius: 4px;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌑 Z-TECH IMPERIAL VAULT 🌑</h1>
        
        <div style="text-align: center; margin-bottom: 30px;">
            <button onclick="checkAdmin()" class="btn-create" style="cursor: pointer;">
                🔒 สร้างสายพันธุ์ใหม่ & ออก QR Code
            </button>
        </div>

        <div class="filter-section">
            <input type="text" id="search-input" class="filter-input" placeholder="🔍 ค้นหาสายพันธุ์ หรือ รหัส SKU..." onkeyup="filterTable()">
            <select id="category-filter" class="filter-input" onchange="filterTable()" style="flex: 0.5;">
                <option value="">-- ทุกประเภท --</option>
                <option value="ดอก">ดอก (Flower)</option>
                <option value="ผง">ผง (Kief/Shake)</option>
                <option value="ใบทริม">ใบทริม (Trim)</option>
            </select>
            <select id="grade-filter" class="filter-input" onchange="filterTable()" style="flex: 0.5;">
                <option value="">-- ทุกเกรด --</option>
                <option value="TOP">TOP</option>
                <option value="Mid">Mid</option>
                <option value="Pop">Pop</option>
                <option value="Minipop">Minipop</option>
                <option value="Mixed">Mixed</option>
                <option value="Reject">ตีกลับ (Reject)</option>
            </select>
        </div>

        <table>
            <thead>
                <tr>
                    <th>รหัสสินค้า (SKU)</th>
                    <th>สายพันธุ์ (Strain)</th>
                    <th>ประเภท</th>
                    <th>เกรด</th>
                    <th>น้ำหนัก (กรัม)</th>
                </tr>
            </thead>
            <tbody id="product-list">
                <tr><td colspan="5" style="text-align:center; padding: 20px;">กำลังเปิดประตูคลังแห่งความมืด...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        const supabaseUrl = 'https://zwpagcqoopvinufsgluc.supabase.co';
        const supabaseKey = 'sb_publishable_mirbWPp7tEPi5YiTFPnSSw_BZsKkfLa'; 
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let allProducts = []; // เก็บข้อมูลทั้งหมดไว้ในสมองส่วนหน้า เพื่อให้ค้นหาได้ไวที่สุด

        async function loadInventory() {
            const { data, error } = await _supabase.from('ztech_inventory').select('*').order('last_updated', { ascending: false });
            const list = document.getElementById('product-list');
            
            if (error) {
                list.innerHTML = `<tr><td colspan="5" style="text-align:center;color:#ff4444;">❌ ขัดข้อง: ${error.message}</td></tr>`;
                return;
            }

            if (data && data.length > 0) {
                allProducts = data; // บันทึกข้อมูลลงตัวแปร
                renderTable(allProducts); // วาดตาราง
            } else {
                list.innerHTML = `<tr><td colspan="5" style="text-align:center; padding: 30px; color: #666;">คลังสินค้าว่างเปล่า... รอการรับเข้าจากจอมมาร</td></tr>`;
            }
        }

        function renderTable(dataToRender) {
            const list = document.getElementById('product-list');
            if (dataToRender.length > 0) {
                list.innerHTML = dataToRender.map(item => `
                    <tr>
                        <td style="color: #fff; font-family: monospace; font-size: 16px;">${item.sku}</td>
                        <td>${item.strain_name}</td>
                        <td>${item.category}</td>
                        <td><span class="badge">${item.grade}</span></td>
                        <td style="color: #d4af37; font-weight: bold; font-size: 16px;">${item.stock_weight} g</td>
                    </tr>
                `).join('');
            } else {
                list.innerHTML = `<tr><td colspan="5" style="text-align:center; padding: 20px; color: #666;">-- ไม่พบสายพันธุ์ที่ค้นหา --</td></tr>`;
            }
        }

        // ฟังก์ชันกรองข้อมูลแบบเรียลไทม์
        function filterTable() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const categoryTerm = document.getElementById('category-filter').value;
            const gradeTerm = document.getElementById('grade-filter').value;

            const filteredData = allProducts.filter(item => {
                const matchSearch = item.strain_name.toLowerCase().includes(searchTerm) || item.sku.toLowerCase().includes(searchTerm);
                const matchCategory = categoryTerm === "" || item.category === categoryTerm;
                const matchGrade = gradeTerm === "" || item.grade === gradeTerm;
                
                return matchSearch && matchCategory && matchGrade;
            });

            renderTable(filteredData);
        }

        loadInventory();

        // ระบบล็อคประตูห้องนิรภัย
        function checkAdmin() {
            let pass = prompt("🌑 ระบบสงวนสิทธิ์เฉพาะผู้บริหาร กรุณาใส่รหัสผ่าน:");
            if (pass === "0420") {
                window.location.href = "manage.html";
            } else if (pass !== null && pass !== "") {
                alert("❌ รหัสผ่านไม่ถูกต้อง! คุณไม่มีสิทธิ์เข้าถึงส่วนนี้ค่ะ");
            }
        }
    </script>
</body>
</html>
