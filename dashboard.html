<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-Tech Global | Inventory Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Gothic Dark Theme */
        body { background-color: #0a0a0a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; border: 1px solid #333; padding: 20px; border-radius: 8px; background: #111; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        h1 { color: #d4af37; text-align: center; font-size: 24px; letter-spacing: 2px; }
        .status-card { border-left: 4px solid #d4af37; background: #1a1a1a; padding: 15px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { border-bottom: 2px solid #333; padding: 10px; text-align: left; color: #d4af37; }
        td { padding: 10px; border-bottom: 1px solid #222; }
        .badge { background: #d4af37; color: black; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Z-TECH GLOBAL SYSTEM</h1>
        <div class="status-card">
            <p><strong>สถานะระบบ:</strong> <span style="color: #00ff00;">ONLINE</span></p>
            <p><strong>หน่วยงาน:</strong> บริหารจัดการคลังสินค้าส่วนกลาง</p>
        </div>

        <table>
            <thead>
                <tr>
                    <th>รหัสสินค้า (SKU)</th>
                    <th>รายการสินค้า</th>
                    <th>น้ำหนักสุทธิ (กรัม)</th>
                    <th>สถานะ</th>
                </tr>
            </thead>
            <tbody id="product-list">
                <tr><td colspan="4" style="text-align:center;">กำลังเรียกข้อมูลจากฐานข้อมูล...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        // เชื่อมต่อกับฐานข้อมูล (กุญแจของบอส)
        const supabaseUrl = 'https://zwpagcqoopvinufsgluc.supabase.co';
        const supabaseKey = 'sb_publishable_mirbWPp7tEPi5YiTFPnSSw_BZsKkfLa'; // ใช้ตัว Publishable Key เพื่อความปลอดภัยหน้าบ้าน
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function loadInventory() {
            const { data, error } = await _supabase.from('products').select('*');
            const list = document.getElementById('product-list');
            
            if (data) {
                list.innerHTML = data.map(item => `
                    <tr>
                        <td><strong>${item.sku}</strong></td>
                        <td>${item.name}</td>
                        <td style="color: #d4af37;">${item.stock_weight} g</td>
                        <td><span class="badge">พร้อมจำหน่าย</span></td>
                    </tr>
                `).join('');
            }
        }
        loadInventory();
    </script>
</body>
</html>
