<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-Tech Global | Inventory System</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #0a0a0a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1050px; margin: auto; border: 1px solid #333; padding: 20px; border-radius: 8px; background: #111; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        h1 { color: #d4af37; text-align: center; font-size: 26px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 20px; }
        
        /* 🌟 ระบบเลื่อนตารางบนมือถือ */
        .table-responsive { overflow-x: auto; -webkit-overflow-scrolling: touch; width: 100%; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th { border-bottom: 2px solid #d4af37; padding: 12px; text-align: left; color: #d4af37; font-size: 16px; white-space: nowrap; }
        td { padding: 12px; border-bottom: 1px solid #222; font-size: 15px; vertical-align: middle; white-space: nowrap; }
        
        .badge { background: #333; color: #d4af37; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; border: 1px solid #d4af37; }
        
        .btn-create { display: inline-block; padding: 12px 24px; background: #d4af37; color: #000; text-decoration: none; font-weight: bold; font-size: 16px; border-radius: 5px; border: 2px solid #b5952f; cursor: pointer; transition: 0.2s; white-space: nowrap; }
        .btn-create:hover { background: #b5952f; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(212, 175, 55, 0.2); }
        .btn-action { background: #222; color: #d4af37; border: 1px solid #d4af37; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-action:hover { background: #d4af37; color: #000; }

        .filter-section { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-input { flex: 1; min-width: 140px; padding: 10px; background: #222; border: 1px solid #444; color: white; border-radius: 4px; font-size: 15px; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); overflow-y: auto; }
        .modal-content { background-color: #111; margin: 5% auto; padding: 30px; border: 2px solid #d4af37; width: 90%; max-width: 600px; border-radius: 10px; position: relative; }
        .close { color: #888; position: absolute; right: 20px; top: 15px; font-size: 28px; font-weight: bold; cursor: pointer; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; color: #d4af37; margin-bottom: 5px; font-size: 14px; font-weight: bold; }
        .form-input { width: 100%; padding: 10px; background: #050505; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        
        .btn-submit { width: 100%; padding: 15px; background: #4a0e4e; color: white; font-size: 18px; font-weight: bold; border: 1px solid #8b008b; border-radius: 5px; cursor: pointer; margin-top: 20px; }
        .thumb-img, .thumb-placeholder { width: 50px; height: 50px; border-radius: 4px; border: 1px solid #d4af37; cursor: pointer; object-fit: cover; }
        .thumb-placeholder { background: #222; border-style: dashed; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #d4af37; }
        
        /* 🌟 ปรับแต่งสำหรับมือถือ (Mobile Responsive) */
        @media (max-width: 768px) {
            body { padding: 10px; }
            .container { padding: 15px; }
            .grid-2, .grid-3 { grid-template-columns: 1fr; gap: 10px; } /* ให้ฟอร์มเรียงลงมาเป็นแนวตั้งแถวเดียว */
            .filter-section { flex-direction: column; }
            .filter-input { width: 100%; }
            .action-buttons-top { flex-direction: column; width: 100%; }
            .btn-create { width: 100%; text-align: center; }
            h1 { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌑 Z-TECH INVENTORY 🌑</h1>
        
        <div class="action-buttons-top" style="text-align: center; margin-bottom: 20px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;">
            <button onclick="checkAdmin('manage')" class="btn-create">➕ เพิ่มรายการสินค้าใหม่</button>
            <a href="log.html" class="btn-create" style="background: #8b0000; border-color: #550000; color: white;">📊 ดูประวัติบิล & กำไร</a>
        </div>

        <div class="filter-section" style="position: sticky; top: 0; z-index: 10; background: #111; padding-bottom: 10px; border-bottom: 1px solid #333;">
            <input type="text" id="search-input" class="filter-input" placeholder="🔍 ค้นหาสายพันธุ์..." onkeyup="filterTable()">
            <select id="farm-filter" class="filter-input" onchange="filterTable()">
                <option value="">-- ทุกฟาร์ม --</option>
            </select>
            <select id="category-filter" class="filter-input" onchange="filterTable()">
                <option value="">-- ทุกประเภท --</option>
                <option value="ดอก">ดอก</option>
                <option value="ใต้เครื่อง">ใต้เครื่อง</option>
                <option value="ใบทริม">ใบทริม</option>
            </select>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>รูป</th>
                        <th>รหัส (SKU)</th>
                        <th>สายพันธุ์</th>
                        <th>ประเภท</th>
                        <th>เกรด</th>
                        <th>ฟาร์ม</th>
                        <th>สต๊อก (g)</th>
                        <th style="text-align:center;">Action</th>
                    </tr>
                </thead>
                <tbody id="product-list">
                    <tr><td colspan="8" style="text-align:center;">กำลังโหลดข้อมูล...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <datalist id="farm-suggestions"></datalist>

    <div id="addProductModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeAddModal()">&times;</span>
            <h2 style="color:#d4af37; margin-top:0; text-align:center; border-bottom: 1px solid #333; padding-bottom: 10px;">🌑 เพิ่มรายการสินค้าใหม่</h2>
            
            <div class="grid-2">
                <div class="form-group"><label>รหัส SKU</label><input type="text" id="f_sku" class="form-input" readonly style="color: #888; background: #222;"></div>
                <div class="form-group"><label>ชื่อสายพันธุ์</label><input type="text" id="f_strain" class="form-input"></div>
            </div>
            <div class="grid-2">
                <div class="form-group">
                    <label>ประเภท</label>
                    <select id="f_category" class="form-input" onchange="toggleGrade()"><option value="ดอก">ดอก</option><option value="ใต้เครื่อง">ใต้เครื่อง</option><option value="ใบทริม">ใบทริม</option></select>
                </div>
                <div class="form-group">
                    <label>เกรด</label>
                    <select id="f_grade" class="form-input"><option value="TOP">TOP</option><option value="Mid">Mid</option><option value="-">-</option></select>
                </div>
            </div>

            <h3 style="color:#888; font-size:14px; border-bottom:1px solid #333; margin-top:15px;">📦 ข้อมูลฟาร์ม & ราคา</h3>
            <div class="grid-2">
                <div class="form-group">
                    <label>ชื่อฟาร์ม (คลิกเพื่อเลือกชื่อเก่า)</label>
                    <input type="text" id="f_farm" class="form-input" list="farm-suggestions" placeholder="พิมพ์หรือเลือกจากรายการ">
                </div>
                <div class="form-group"><label>ต้นทุนรับเข้า</label><input type="number" step="any" id="f_cost" class="form-input" placeholder="0"></div>
            </div>
            <div class="grid-3">
                <div class="form-group"><label>ปลีก (1g)</label><input type="number" step="any" id="f_base" class="form-input"></div>
                <div class="form-group"><label>ส่ง (1 ขีด)</label><input type="number" step="any" id="f_t1" class="form-input"></div>
                <div class="form-group"><label>ส่ง (1 กิโล)</label><input type="number" step="any" id="f_t2" class="form-input"></div>
            </div>

            <div class="form-group" style="margin-top: 10px;">
                <label style="color: #39ff14;">⚖️ สต๊อกแรกเข้า (g)</label>
                <input type="number" step="any" id="f_stock" class="form-input" style="border-color: #39ff14;">
            </div>
            <button class="btn-submit" id="save-btn" onclick="saveNewProduct()">💾 บันทึกข้อมูล</button>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://zwpagcqoopvinufsgluc.supabase.co';
        const supabaseKey = 'sb_publishable_mirbWPp7tEPi5YiTFPnSSw_BZsKkfLa'; 
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);
        let allProducts = [];

        function toggleGrade() {
            const cat = document.getElementById('f_category').value;
            const grade = document.getElementById('f_grade');
            grade.disabled = cat !== 'ดอก';
            if (cat !== 'ดอก') grade.value = '-';
        }

        async function loadInventory() {
            const { data, error } = await _supabase.from('ztech_inventory').select('*').order('last_updated', { ascending: false });
            if (error) return;

            if (data && data.length > 0) {
                allProducts = data; 
                
                // 🌟 ดึงชื่อฟาร์มที่ไม่ซ้ำกัน
                const uniqueFarms = [...new Set(data.map(item => item.farm_name).filter(name => name))];
                
                // 1. ใส่ในช่องค้นหา (Filter)
                document.getElementById('farm-filter').innerHTML = '<option value="">-- ทุกฟาร์ม --</option>' + uniqueFarms.map(f => `<option value="${f}">${f}</option>`).join('');
                
                // 2. ใส่ใน Datalist เพื่อทำ Auto-suggest ตอนเพิ่มสินค้า
                document.getElementById('farm-suggestions').innerHTML = uniqueFarms.map(f => `<option value="${f}">`).join('');

                renderTable(allProducts); 
            }
        }

        function renderTable(dataToRender) {
            const list = document.getElementById('product-list');
            list.innerHTML = dataToRender.map(item => {
                let imgThumb = item.image_url ? `<img src="${item.image_url}" class="thumb-img">` : `<div class="thumb-placeholder">NO IMG</div>`;
                return `<tr>
                    <td>${imgThumb}</td>
                    <td style="font-family: monospace;">${item.sku}</td>
                    <td style="font-weight: bold;">${item.strain_name}</td>
                    <td>${item.category}</td>
                    <td><span class="badge">${item.grade}</span></td>
                    <td style="color:#888;">${item.farm_name || '-'}</td>
                    <td style="color:#39ff14; font-weight:bold;">${item.stock_weight.toLocaleString()} g</td>
                    <td style="text-align:center;"><button class="btn-action">🔳 QR</button></td>
                </tr>`;
            }).join('');
        }

        function filterTable() {
            const search = document.getElementById('search-input').value.toLowerCase();
            const farm = document.getElementById('farm-filter').value;
            const cat = document.getElementById('category-filter').value;
            const filtered = allProducts.filter(i => 
                (i.strain_name.toLowerCase().includes(search) || i.sku.toLowerCase().includes(search)) &&
                (farm === "" || i.farm_name === farm) &&
                (cat === "" || i.category === cat)
            );
            renderTable(filtered);
        }

        function checkAdmin(page) {
            let pass = prompt("🔒 ระบบผู้จัดการ: ใส่รหัสผ่าน 0420");
            if(pass === "0420") {
                if(page === 'manage') {
                    document.getElementById('f_sku').value = `ZT-${Math.random().toString(36).substr(2,6).toUpperCase()}`;
                    document.getElementById('addProductModal').style.display = 'block';
                }
            } else if(pass) alert("❌ รหัสผิด!");
        }

        function closeAddModal() { document.getElementById('addProductModal').style.display = 'none'; }

        async function saveNewProduct() {
            const btn = document.getElementById('save-btn'); btn.innerHTML = "⏳ บันทึก..."; btn.disabled = true;
            try {
                const payload = {
                    sku: document.getElementById('f_sku').value,
                    strain_name: document.getElementById('f_strain').value.trim(),
                    category: document.getElementById('f_category').value,
                    grade: document.getElementById('f_grade').value,
                    farm_name: document.getElementById('f_farm').value.trim(),
                    cost_price: parseFloat(document.getElementById('f_cost').value) || 0,
                    price_base: parseFloat(document.getElementById('f_base').value) || 0,
                    price_tier1: parseFloat(document.getElementById('f_t1').value) || 0,
                    price_tier2: parseFloat(document.getElementById('f_t2').value) || 0,
                    stock_weight: parseFloat(document.getElementById('f_stock').value) || 0
                };
                await _supabase.from('ztech_inventory').insert([payload]);
                closeAddModal(); loadInventory(); alert("✅ สำเร็จ");
            } catch(e) { alert("❌ " + e.message); } finally { btn.innerHTML = "💾 บันทึกข้อมูล"; btn.disabled = false; }
        }

        loadInventory();
    </script>
</body>
</html>
