<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-Tech | POS System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#050505', zPurple: '#4a0e4e', neonGreen: '#39ff14', goldDark: '#b5952f'
                    },
                    fontFamily: { sans: ['Segoe UI', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #050505; color: #e0e0e0; }
        .neon-border { border: 1px solid #39ff14; box-shadow: 0 0 10px rgba(57, 255, 20, 0.2); }
        .purple-glow:hover { box-shadow: 0 0 15px rgba(74, 14, 78, 0.8); border-color: #4a0e4e; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #4a0e4e; border-radius: 10px; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        #qr-reader { width: 100%; border-radius: 8px; overflow: hidden; border: 1px solid #39ff14; display: none; margin-bottom: 15px; }
        #qr-reader__scan_region { background: #000; }
        #qr-reader__dashboard { background: #111; color: #fff; padding: 10px; }
        #qr-reader__dashboard_section_csr button { background: #4a0e4e; color: #fff; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body class="h-screen flex flex-col md:flex-row overflow-hidden">

    <div class="w-full md:w-2/3 h-1/2 md:h-full p-4 md:p-6 overflow-y-auto border-b md:border-b-0 md:border-r border-zPurple flex flex-col">
        <div class="flex justify-between items-center mb-4 border-b border-gray-800 pb-2 shrink-0">
            <h1 class="text-2xl md:text-3xl font-bold text-goldDark tracking-widest uppercase">
                🌑 Z-Tech Inventory
            </h1>
        </div>

        <div class="flex flex-col gap-2 mb-4 shrink-0">
            <div class="flex gap-2">
                <input type="text" id="search-inventory" placeholder="🔍 ค้นหาสายพันธุ์, รหัส หรือ ฟาร์ม..." class="w-1/2 bg-gray-900 border border-gray-700 text-white p-2 rounded focus:outline-none focus:border-neonGreen text-sm" onkeyup="filterInventory()">
                <select id="farm-filter" class="w-1/4 bg-gray-900 border border-gray-700 text-white p-2 rounded focus:outline-none focus:border-neonGreen text-sm" onchange="filterInventory()">
                    <option value="">-- ทุกฟาร์ม --</option>
                </select>
            </div>
            <div class="flex gap-2">
                <select id="category-filter" class="w-1/2 bg-gray-900 border border-gray-700 text-white p-2 rounded focus:outline-none focus:border-neonGreen text-sm" onchange="filterInventory()">
                    <option value="">-- ทุกประเภท --</option>
                    <option value="ดอก">ดอก (Flower)</option>
                    <option value="ใต้เครื่อง">ใต้เครื่อง (Powder)</option>
                    <option value="ใบทริม">ใบทริม (Trim)</option>
                </select>
                <select id="grade-filter" class="w-1/2 bg-gray-900 border border-gray-700 text-white p-2 rounded focus:outline-none focus:border-neonGreen text-sm" onchange="filterInventory()">
                    <option value="">-- ทุกเกรด --</option>
                    <option value="TOP">TOP</option>
                    <option value="Mid">Mid</option>
                    <option value="Pop">Pop</option>
                    <option value="Mini-pop">Mini-pop</option>
                    <option value="Mixed">Mixed</option>
                    <option value="Other">Other</option>
                    <option value="-">-</option>
                </select>
            </div>
        </div>

        <div class="grid grid-cols-2 lg:grid-cols-3 gap-4 flex-grow overflow-y-auto content-start" id="product-grid"></div>
    </div>

    <div class="w-full md:w-1/3 h-1/2 md:h-full p-4 md:p-6 bg-black flex flex-col relative">
        <h2 class="text-xl md:text-2xl text-neonGreen font-bold mb-3 text-center tracking-wider shrink-0">🛒 ORDER CART</h2>
        
        <div class="flex gap-2 mb-3 shrink-0">
            <input type="text" id="scanner-input" placeholder="🔳 ใช้ปืนสแกน..." class="w-2/3 bg-black border border-neonGreen text-neonGreen font-mono text-center tracking-widest p-2 rounded focus:outline-none" autocomplete="off">
            <button onclick="toggleCamera()" class="w-1/3 bg-gray-800 hover:bg-gray-700 text-neonGreen border border-neonGreen rounded font-bold text-sm">
                📷 กล้อง
            </button>
        </div>

        <div id="qr-reader" class="shrink-0"></div>

        <div class="mb-3 shrink-0">
            <input type="text" id="customer-name" placeholder="ชื่อร้านค้า/ลูกค้า" class="w-full bg-gray-900 border border-zPurple text-white p-2 rounded focus:outline-none focus:border-neonGreen">
        </div>

        <div class="flex-grow overflow-y-auto mb-3 border-b border-gray-800 pb-2" id="cart-items">
            <p class="text-gray-600 text-center mt-5 text-sm">ตะกร้าว่างเปล่า...</p>
        </div>

        <div class="bg-gray-900 p-3 rounded border border-gray-800 mb-3 shrink-0" id="summary-box">
            <div class="flex justify-between text-gray-400 text-sm mb-1">
                <span>น้ำหนักรวม:</span>
                <span id="total-grams" class="text-white font-bold">0 g</span>
            </div>
            
            <div class="flex justify-between text-gray-400 text-sm mb-1">
                <span>ยอดก่อนลด:</span>
                <span id="subtotal-price" class="text-white">฿0.00</span>
            </div>

            <div class="flex justify-between text-red-500 hover:text-red-400 mb-2 pb-1 border-b border-gray-700 cursor-pointer text-sm" onclick="promptDiscount()">
                <span class="font-bold">🎟️ ส่วนลด (คลิก):</span>
                <span id="discount-display" class="font-bold">- ฿0.00</span>
            </div>

            <div class="flex justify-between text-base font-bold items-end mt-1">
                <span class="text-goldDark">ยอดสุทธิ:</span>
                <div class="text-right">
                    <span id="total-price" class="text-white text-2xl">฿0.00</span>
                </div>
            </div>
        </div>

        <button id="checkout-btn" class="w-full bg-zPurple hover:bg-purple-900 text-white font-bold py-3 rounded-lg border border-purple-500 neon-border text-base shrink-0" onclick="checkout()">
            ✅ ยืนยันคำสั่งซื้อ
        </button>
    </div>

    <script>
        const supabaseUrl = 'https://zwpagcqoopvinufsgluc.supabase.co'; 
        const supabaseKey = 'sb_publishable_mirbWPp7tEPi5YiTFPnSSw_BZsKkfLa'; 
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);
        
        let cart = []; 
        let specialDiscount = 0;
        let globalInventory = []; 
        let html5QrcodeScanner = null;

        async function loadImperialVault() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '<p class="text-zPurple animate-pulse col-span-2 lg:col-span-3 text-center tracking-widest text-sm">⏳ โหลดข้อมูล...</p>';

            try {
                const { data, error } = await _supabase.from('ztech_inventory').select('*').order('strain_name', { ascending: true });
                if (error) throw error;
                
                globalInventory = data || []; 
                
                const farmSelect = document.getElementById('farm-filter');
                const uniqueFarms = [...new Set(globalInventory.map(item => item.farm_name).filter(name => name))];
                farmSelect.innerHTML = '<option value="">-- ทุกฟาร์ม --</option>' + 
                                       uniqueFarms.map(farm => `<option value="${farm}">${farm}</option>`).join('');

                filterInventory(); 
            } catch (error) {
                grid.innerHTML = '<p class="text-red-500 col-span-2 lg:col-span-3 text-center text-sm">⚠️ ระบบขัดข้อง</p>';
            }
        }

        function filterInventory() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';

            const searchTerm = document.getElementById('search-inventory').value.toLowerCase();
            const farmTerm = document.getElementById('farm-filter').value;
            const categoryTerm = document.getElementById('category-filter').value;
            const gradeTerm = document.getElementById('grade-filter').value;

            let filteredData = globalInventory.filter(item => {
                const farmNameStr = item.farm_name ? item.farm_name.toLowerCase() : "";
                const matchSearch = item.strain_name.toLowerCase().includes(searchTerm) || 
                                    (item.sku && item.sku.toLowerCase().includes(searchTerm)) ||
                                    farmNameStr.includes(searchTerm);
                
                const matchFarm = farmTerm === "" || item.farm_name === farmTerm;
                const matchCategory = categoryTerm === "" || item.category === categoryTerm;
                const matchGrade = gradeTerm === "" || item.grade === gradeTerm;
                
                return matchSearch && matchFarm && matchCategory && matchGrade;
            });

            if(filteredData.length === 0) {
                grid.innerHTML = '<p class="text-gray-500 col-span-2 lg:col-span-3 text-center text-sm mt-4">ไม่พบสินค้าที่คุณค้นหา</p>';
                return;
            }

            filteredData.forEach(item => {
                let basePrice = item.price_base || 0;
                let tier1Price = item.price_tier1 || 0;
                let tier2Price = item.price_tier2 || 0;
                
                let imgDisplay = item.image_url 
                    ? `<img src="${item.image_url}" class="w-full h-full object-cover opacity-80 hover:opacity-100 transition-opacity">` 
                    : `<span class="text-gray-600 font-bold uppercase tracking-widest text-xs">${item.category || 'ITEM'}</span>`;

                let gradeDisplay = item.grade && item.grade !== '-' ? `<div class="absolute top-1 right-1 bg-zPurple text-[10px] px-2 py-0.5 rounded text-white shadow-md border border-purple-500">${item.grade}</div>` : '';

                // อัปเกรด Card: ใส่ flex flex-col h-full ให้กล่องเสมอกัน และ aspect-square ให้รูป 1:1
                const cardHTML = `
                    <div class="bg-gray-900 rounded-lg p-3 cursor-pointer purple-glow transition-all duration-300 border border-gray-800 relative flex flex-col h-full" 
                         onclick="addToCart('${item.strain_name}', ${basePrice}, ${tier1Price}, ${tier2Price}, ${item.stock_weight}, '${item.sku}')">
                        <div class="aspect-square w-full bg-black rounded border border-gray-700 mb-2 flex items-center justify-center overflow-hidden relative shrink-0">
                            ${imgDisplay}
                            ${gradeDisplay}
                        </div>
                        <div class="flex-grow flex flex-col justify-end">
                            <h2 class="text-sm md:text-base font-bold text-white mb-1 leading-tight line-clamp-2">${item.strain_name}</h2>
                            <div class="flex justify-between items-end text-[10px] md:text-xs text-gray-400 mt-auto pt-1 border-t border-gray-800">
                                <span class="${item.stock_weight > 0 ? 'text-neonGreen font-bold' : 'text-red-500 font-bold'}">สต๊อก: ${item.stock_weight.toLocaleString()}g</span>
                            </div>
                        </div>
                    </div>
                `;
                grid.insertAdjacentHTML('beforeend', cardHTML);
            });
        }

        // --- ระบบสแกนและตะกร้า ---
        function processScanResult(skuScanned) {
            skuScanned = skuScanned.trim().toUpperCase();
            if (!skuScanned) return;

            let foundItem = globalInventory.find(item => item.sku && item.sku.toUpperCase() === skuScanned);
            
            if (foundItem) {
                addToCart(foundItem.strain_name, foundItem.price_base || 0, foundItem.price_tier1 || 0, foundItem.price_tier2 || 0, foundItem.stock_weight, foundItem.sku);
            } else {
                alert('❌ ไม่พบสินค้ารหัส [' + skuScanned + ']');
            }
            document.getElementById('scanner-input').value = '';
        }

        document.getElementById('scanner-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                processScanResult(this.value);
            }
        });

        function toggleCamera() {
            const readerDiv = document.getElementById('qr-reader');
            if (readerDiv.style.display === 'block') {
                if(html5QrcodeScanner) { html5QrcodeScanner.clear(); html5QrcodeScanner = null; }
                readerDiv.style.display = 'none';
            } else {
                readerDiv.style.display = 'block';
                html5QrcodeScanner = new Html5QrcodeScanner("qr-reader", { fps: 10, qrbox: {width: 200, height: 200} }, false);
                html5QrcodeScanner.render(
                    (decodedText) => { toggleCamera(); processScanResult(decodedText); },
                    (error) => { /* ignore */ }
                );
            }
        }

        function addToCart(name, base, t1, t2, stock, sku) {
            if (stock <= 0) return alert(`⚠️ สินค้าหมด`);
            if (cart.find(item => item.name === name)) return alert(`⚠️ มีในตะกร้าแล้ว`);
            cart.push({ name, base, t1, t2, stock, sku, weight: 0 });
            renderCart();
        }

        function renderCart() {
            const cartDiv = document.getElementById('cart-items');
            if (cart.length === 0) {
                cartDiv.innerHTML = '<p class="text-gray-600 text-center mt-5 text-sm">ตะกร้าว่างเปล่า...</p>';
                calculateTotals();
                return;
            }

            cartDiv.innerHTML = '';
            cart.forEach((item, index) => {
                const itemHTML = `
                <div class="bg-gray-900 p-2 md:p-3 rounded mb-2 border border-gray-800">
                    <div class="flex justify-between items-center mb-1">
                        <span class="font-bold text-white text-xs md:text-sm truncate w-3/4">${item.name} <span class="text-[10px] text-gray-500">(${item.stock}g)</span></span>
                        <button class="text-red-500 text-sm" onclick="removeFromCart(${index})">✖</button>
                    </div>
                    <div class="flex gap-1">
                        <input type="number" step="any" placeholder="กรัม" 
                               class="w-1/2 bg-black border border-gray-700 text-white p-1 md:p-2 rounded text-center text-sm focus:border-neonGreen outline-none" 
                               value="${item.weight || ''}" 
                               oninput="updateWeightFast(${index}, this.value)" 
                               max="${item.stock}">
                        <div class="w-1/2 bg-black flex flex-col justify-center items-center rounded border border-gray-700">
                            <span id="price-display-${index}" class="text-white font-bold text-sm">฿${item.base}</span>
                        </div>
                    </div>
                </div>`;
                cartDiv.insertAdjacentHTML('beforeend', itemHTML);
            });
            calculateTotals();
        }

        function updateWeightFast(index, value) {
            let w = parseFloat(value);
            if (isNaN(w) || w < 0) w = 0;
            if (w > cart[index].stock) {
                alert(`⚠️ สินค้าไม่พอ!`);
                cart[index].weight = cart[index].stock;
                renderCart();
                return;
            }
            cart[index].weight = w;
            calculateTotals(); 
        }

        function removeFromCart(index) { cart.splice(index, 1); renderCart(); }

        function promptDiscount() {
            let pin = prompt("🔒 รหัสผ่านผู้จัดการ:");
            if (pin === "0420") {
                let amountStr = prompt("🎟️ จำนวนเงินที่ต้องการลด:");
                if (amountStr !== null && !isNaN(parseFloat(amountStr))) {
                    specialDiscount = parseFloat(amountStr);
                    calculateTotals();
                }
            } else if (pin) alert("❌ รหัสผิด!");
        }

        function calculateTotals() {
            let totalWeight = cart.reduce((sum, item) => sum + item.weight, 0);
            let subtotalPrice = 0;
            let activeColor = "text-white";

            if (totalWeight >= 1000) activeColor = "text-neonGreen";
            else if (totalWeight >= 100) activeColor = "text-goldDark";

            cart.forEach((item, index) => {
                let activePrice = item.base;
                if (totalWeight >= 1000) activePrice = item.t2;
                else if (totalWeight >= 100) activePrice = item.t1;
                subtotalPrice += (activePrice * item.weight);
                
                let priceDisplay = document.getElementById(`price-display-${index}`);
                if (priceDisplay) {
                    priceDisplay.innerText = `฿${activePrice}`;
                    priceDisplay.className = `${activeColor} font-bold text-sm`;
                }
            });

            if (specialDiscount > subtotalPrice) specialDiscount = subtotalPrice;
            let finalPrice = subtotalPrice - specialDiscount;

            document.getElementById('total-grams').innerText = `${totalWeight.toLocaleString()} g`;
            document.getElementById('subtotal-price').innerText = `฿${subtotalPrice.toLocaleString()}`;
            document.getElementById('discount-display').innerText = `- ฿${specialDiscount.toLocaleString()}`;
            
            const totalPriceEl = document.getElementById('total-price');
            totalPriceEl.innerText = `฿${finalPrice.toLocaleString()}`;
            totalPriceEl.className = `${activeColor} text-2xl`;
        }

        async function sendLineSlip(customer, cartItems, totalW, subtotalP, finalP, discount) {
            const token = '2mqUKe/Rb3dM/vKhOPvuXB8ag0eCS7t8ITrg5+NRiTWKXhgeA/aypMOZc5aDDvpufwkkeioOULxPu7/57MGs7Y1HGGfMW7xZd9vQD0lyY5DID8X9dfYv6AYHm3q1vqLDHzsrPO51asEQDb7stjyMSgdB04t89/1O/w1cDnyilFU=';
            const userId = 'Cbf93761b1ac023b9fbe28afa7efbfb16'; 
            let itemList = cartItems.map(item => `▪️ ${item.name}: ${item.weight}g`).join('\n');
            let msgText = `🌑 Z-Tech Management 🌑\n\n✅ ยืนยันคำสั่งซื้อ\n━━━━━━━━━━━━━━\n👤 ลูกค้า: ${customer}\n⚖️ น้ำหนักรวม: ${totalW} g\n💰 ยอดรวม: ฿${subtotalP}\n`;
            if (discount > 0) msgText += `🎟️ ส่วนลด: -฿${discount}\n`;
            msgText += `🔥 ยอดสุทธิ: ฿${finalP}\n━━━━━━━━━━━━━━\n📦 รายการ:\n${itemList}`;

            await fetch('https://corsproxy.io/?' + encodeURIComponent('https://api.line.me/v2/bot/message/push'), {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ to: userId, messages: [{ type: 'text', text: msgText }] })
            }).catch(e => console.warn(e));
        }

        async function checkout() {
            let customer = document.getElementById('customer-name').value.trim();
            if(!customer) return alert("⚠️ ระบุชื่อลูกค้า!");
            let validCart = cart.filter(item => item.weight > 0);
            if(validCart.length === 0) return alert("⚠️ ตะกร้าว่าง!");

            const btn = document.getElementById('checkout-btn');
            btn.innerHTML = "⏳ กำลังบันทึก...";
            btn.disabled = true;

            try {
                for (let item of validCart) {
                    await _supabase.from('ztech_inventory').update({ stock_weight: item.stock - item.weight }).eq('strain_name', item.name);
                    await _supabase.from('ztech_logs').insert([{ sku: item.sku || 'N/A', action_type: 'OUT', weight_change: item.weight, performed_by: `POS: ${customer}` }]);
                }

                let totalW = validCart.reduce((sum, item) => sum + item.weight, 0);
                let subtotalP = 0;
                validCart.forEach(item => {
                    let activePrice = item.base;
                    if (totalW >= 1000) activePrice = item.t2;
                    else if (totalW >= 100) activePrice = item.t1;
                    subtotalP += (activePrice * item.weight);
                });
                let finalP = Math.max(0, subtotalP - specialDiscount);

                await _supabase.from('ztech_orders').insert([{ cart_items: validCart, total_weight: totalW, seller_name: customer, discount_amount: specialDiscount, net_price: finalP }]);
                await sendLineSlip(customer, validCart, totalW, subtotalP, finalP, specialDiscount);

                alert(`✅ ปิดการขายให้ [${customer}] สำเร็จ!`);
                cart = []; specialDiscount = 0; document.getElementById('customer-name').value = '';
                renderCart(); loadImperialVault(); 
            } catch (error) {
                alert("❌ ขัดข้อง: " + error.message);
            } finally {
                btn.innerHTML = "✅ ยืนยันคำสั่งซื้อ"; btn.disabled = false;
            }
        }

        window.addEventListener('DOMContentLoaded', loadImperialVault);
    </script>
</body>
</html>
