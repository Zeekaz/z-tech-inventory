<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-Tech Global | Management</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #0a0a0a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .container { max-width: 500px; margin: auto; border: 1px solid #333; padding: 30px; border-radius: 8px; background: #111; }
        h1 { color: #d4af37; text-align: center; letter-spacing: 2px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #d4af37; font-weight: bold; }
        input, select { width: 100%; padding: 12px; background: #222; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #d4af37; color: black; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #b8962d; }
        #status { margin-top: 20px; text-align: center; padding: 10px; border-radius: 4px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>TRANSACTION</h1>
        <div class="form-group">
            <label>รหัสสินค้า (Product SKU)</label>
            <input type="text" id="sku" placeholder="ระบุหรือสแกนบาร์โค้ด">
        </div>
        <div class="form-group">
            <label>ประเภทรายการ (Type)</label>
            <select id="type">
                <option value="IN">บันทึกการนำเข้าสินค้า (Stock IN)</option>
                <option value="OUT">บันทึกการนำจ่ายสินค้า (Stock OUT)</option>
            </select>
        </div>
        <div class="form-group">
            <label>น้ำหนักสุทธิ (กรัม)</label>
            <input type="number" id="weight" step="0.01" placeholder="0.00">
        </div>
        <button onclick="handleTransaction()">ยืนยันบันทึกรายการ</button>
        <div id="status"></div>
    </div>

    <script>
        const _supabase = supabase.createClient('https://zwpagcqoopvinufsgluc.supabase.co', 'sb_publishable_mirbWPp7tEPi5YiTFPnSSw_BZsKkfLa');

        async function handleTransaction() {
            const sku = document.getElementById('sku').value;
            const type = document.getElementById('type').value;
            const weight = parseFloat(document.getElementById('weight').value);
            const statusDiv = document.getElementById('status');

            if (!sku || isNaN(weight)) {
                alert("กรุณากรอกข้อมูลให้ครบถ้วน");
                return;
            }

            statusDiv.style.display = 'block';
            statusDiv.innerHTML = "กำลังประมวลผล...";
            statusDiv.style.background = '#333';

            // 1. ตรวจสอบสินค้าในคลัง
            const { data: product, error: pError } = await _supabase.from('products').select('*').eq('sku', sku).single();

            if (pError || !product) {
                statusDiv.innerHTML = "❌ ไม่พบรหัสสินค้าในระบบ";
                statusDiv.style.background = "#550000";
                return;
            }

            // 2. คำนวณน้ำหนักใหม่
            let newWeight = product.stock_weight;
            if (type === 'IN') newWeight += weight;
            else newWeight -= weight;

            // 3. อัปเดตสต๊อกและบันทึกประวัติ
            const { error: uError } = await _supabase.from('products').update({ stock_weight: newWeight }).eq('sku', sku);
            await _supabase.from('inventory_logs').insert([{ sku, type, weight }]);

            if (uError) {
                statusDiv.innerHTML = "❌ เกิดข้อผิดพลาดในการบันทึก";
            } else {
                statusDiv.innerHTML = "✅ บันทึกรายการสำเร็จ";
                statusDiv.style.background = "#004400";
                setTimeout(() => location.reload(), 2000);
            }
        }
    </script>
</body>
</html>
